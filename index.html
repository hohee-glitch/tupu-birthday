<!DOCTYPE html>
<html>
<head>
  <title>For Tupu 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #ffe6eb;
      margin: 0;
      padding-top: 80px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #noBtn {
      position: absolute;
    }

    .hidden {
      display: none;
    }

    .letter {
      max-width: 600px;
      margin: auto;
      background: #fffaf0;
      padding: 30px;
      border-radius: 15px;
      font-family: 'Great Vibes', cursive;
      font-size: 22px;
    }

    img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1">
  <h1>Ready to cry? 🥺</h1>
  <button onclick="goPage2()">Yes 💕</button>
  <button id="noBtn">No 😭</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden">
  <h1>💌 A Letter For You</h1>

  <div class="letter">
    (PUT YOUR LETTER HERE)
  </div>

  <br>
  <button onclick="goPage3()">Yes 💞</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="hidden">
  <h1>I love you forever 💖</h1>
  <div id="photos"></div>
</div>

<audio id="song" loop></audio>

<script>
  const noBtn = document.getElementById("noBtn");

  // Move NO button
  noBtn.onmouseover = function () {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  };

  function goPage2() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }

  function goPage3() {
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "block";

    // Load photos
    const photosDiv = document.getElementById("photos");
    photosDiv.innerHTML = "";
    for (let i = 1; i <= 11; i++) {
      const img = document.createElement("img");
      img.src = "photo" + i + ".jpg.jfif";
      photosDiv.appendChild(img);
    }

    // Play music
    const audio = document.getElementById("song");
    audio.src = "song.mp3";
    audio.play();
  }
</script>

</body>
</html>
