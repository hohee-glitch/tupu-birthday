<!DOCTYPE html>
<html>
<head>
  <title>Tupu 💖</title>
</head>
<body style="text-align:center; font-family:Arial; background:#ffe6eb; padding-top:100px;">

  <div id="page1">
    <h1>Ready to cry? 🥺</h1>
    <button onclick="goToPage2()">Yes 💕</button>
    <button>No 😭</button>
  </div>

  <div id="page2" style="display:none;">
    <h1>Letter 💌</h1>
    <p>Your letter will be here</p>
    <button onclick="goToPage3()">Next 💞</button>
  </div>

  <div id="page3" style="display:none;">
    <h1>Photos 💖</h1>
    <img src="photo1.jpg.jfif" width="200">
    <img src="photo2.jpg.jfif" width="200">
    <audio controls src="song.mp3"></audio>
  </div>

  <script>
    function goToPage2() {
      document.getElementById("page1").style.display = "none";
      document.getElementById("page2").style.display = "block";
    }

    function goToPage3() {
      document.getElementById("page2").style.display = "none";
      document.getElementById("page3").style.display = "block";
    }
  </script>

</body>
</html>
